# OpenOCD configuration for ABOV A31G123 (CMSIS-DAP)
# !! Flash driver may need adjustment — verify against ABOV A31G123 datasheet. !!

source [find interface/cmsis-dap.cfg]

transport select swd

# Cortex-M0 target
set CHIPNAME a31g123
set CPUTAPID 0x0BB11477

source [find target/cortex_m.cfg]

# Flash: 64 KB @ 0x00000000
# NOTE: A31G123 has no standard OpenOCD flash driver.
#       Add a custom flash driver or use an external flashing tool.
# flash bank $_FLASHNAME stm32f1x 0x00000000 0x10000 0 0 $_TARGETNAME

adapter speed 1000
reset_config srst_nogate
