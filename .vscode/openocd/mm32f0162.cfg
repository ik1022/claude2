# OpenOCD configuration for MindMotion MM32F0162 (CMSIS-DAP)
# Flash controller is compatible with STM32F0 series.

source [find interface/cmsis-dap.cfg]

transport select swd

set CHIPNAME mm32f0162
set CPUTAPID 0x0BB11477

source [find target/cortex_m.cfg]

# Flash: 64 KB @ 0x08000000 (STM32F0-compatible flash controller)
flash bank $_FLASHNAME stm32f1x 0x08000000 0x10000 0 0 $_TARGETNAME

adapter speed 1000
reset_config srst_nogate
